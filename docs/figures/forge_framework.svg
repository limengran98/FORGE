<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">FORGE framework</title>
  <desc id="desc">A publication-style overview of FORGE, an evidence-calibrated feedback routing system for PEMFC model evolution.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#1f2a37"/>
    </marker>
    <marker id="arrowBlue" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#2457a6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#087568"/>
    </marker>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="128%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <style>
      .canvas { fill: #fbfcfe; }
      .paper { fill: #ffffff; stroke: #d5dce6; stroke-width: 1.2; rx: 18; filter: url(#shadow); }
      .band { fill: #f6f8fb; stroke: #dbe2ea; stroke-width: 1; rx: 14; }
      .box { fill: #ffffff; stroke: #b9c4d0; stroke-width: 1.25; rx: 12; filter: url(#shadow); }
      .blue { fill: #edf4ff; stroke: #4d7cc3; }
      .green { fill: #edf8f5; stroke: #2b8a7e; }
      .gold { fill: #fff8ea; stroke: #cc8a26; }
      .red { fill: #fff1f1; stroke: #c55d5d; }
      .ink { fill: #111827; font-family: Arial, Helvetica, sans-serif; }
      .muted { fill: #4b5563; font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 28px; font-weight: 700; }
      .sub { font-size: 14px; }
      .stage { font-size: 12px; font-weight: 700; letter-spacing: 0.7px; fill: #64748b; }
      .head { font-size: 16px; font-weight: 700; fill: #111827; font-family: Arial, Helvetica, sans-serif; }
      .body { font-size: 12.5px; fill: #374151; font-family: Arial, Helvetica, sans-serif; }
      .tiny { font-size: 11px; fill: #526173; font-family: Arial, Helvetica, sans-serif; }
      .edge { fill: none; stroke: #1f2a37; stroke-width: 1.75; marker-end: url(#arrow); }
      .edgeBlue { fill: none; stroke: #2457a6; stroke-width: 1.9; marker-end: url(#arrowBlue); }
      .edgeGreen { fill: none; stroke: #087568; stroke-width: 1.9; marker-end: url(#arrowGreen); }
      .edgeDash { fill: none; stroke: #64748b; stroke-width: 1.65; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .nodeF { fill: #fff4dc; stroke: #cc8a26; stroke-width: 1.2; }
      .nodeC { fill: #eaf3ff; stroke: #4d7cc3; stroke-width: 1.2; }
      .nodeE { fill: #e8f7f3; stroke: #2b8a7e; stroke-width: 1.2; }
      .nodeO { fill: #f4efff; stroke: #7c5cc4; stroke-width: 1.2; }
      .tag { fill: #ffffff; stroke-width: 1.1; rx: 12; }
    </style>
  </defs>

  <rect class="canvas" x="0" y="0" width="1280" height="720"/>
  <rect class="paper" x="34" y="28" width="1212" height="660"/>

  <text class="ink title" x="70" y="72">FORGE: Feedback Observability-guided Routing for Graph-based Evolution</text>
  <text class="muted sub" x="70" y="99">Diagnostic feedback is routed to model components only through relations calibrated by executable error-correction evidence.</text>

  <rect class="band" x="66" y="124" width="1148" height="170"/>
  <text class="stage" x="92" y="152">EVIDENCE LAYER</text>

  <rect class="box gold" x="94" y="172" width="200" height="84"/>
  <text class="head" x="116" y="198">Diagnostic Feedback</text>
  <text class="body" x="116" y="222">stage error, horizon error</text>
  <text class="body" x="116" y="242">drift, gap, runtime signal</text>

  <rect class="box green" x="376" y="150" width="336" height="124"/>
  <text class="head" x="403" y="178">Evidence Reconstruction Graph</text>
  <circle class="nodeF" cx="429" cy="219" r="18"/>
  <text class="tiny" x="423" y="223">F</text>
  <circle class="nodeC" cx="501" cy="201" r="18"/>
  <text class="tiny" x="495" y="205">C</text>
  <circle class="nodeE" cx="574" cy="219" r="18"/>
  <text class="tiny" x="568" y="223">E</text>
  <circle class="nodeO" cx="646" cy="201" r="18"/>
  <text class="tiny" x="640" y="205">O</text>
  <path class="edgeGreen" d="M447 215 L482 206"/>
  <path class="edgeGreen" d="M519 206 L555 215"/>
  <path class="edgeGreen" d="M592 215 L627 206"/>
  <text class="tiny" x="405" y="256">trust, risk, cooldown, outcome support</text>

  <rect class="box blue" x="790" y="172" width="190" height="84"/>
  <text class="head" x="815" y="198">Strategy Memory</text>
  <text class="body" x="815" y="222">trusted routes</text>
  <text class="body" x="815" y="242">negative edit reuse guard</text>

  <rect class="box red" x="1040" y="172" width="138" height="84"/>
  <text class="head" x="1061" y="198">Edit Scope</text>
  <text class="body" x="1061" y="222">one routed</text>
  <text class="body" x="1061" y="242">component path</text>

  <path class="edgeGreen" d="M294 214 L369 214"/>
  <path class="edgeGreen" d="M712 214 L783 214"/>
  <path class="edgeGreen" d="M980 214 L1033 214"/>

  <rect class="band" x="66" y="322" width="1148" height="196"/>
  <text class="stage" x="92" y="350">EXECUTION LAYER</text>

  <rect class="box blue" x="96" y="380" width="202" height="92"/>
  <text class="head" x="119" y="407">Fixed PEMFC Harness</text>
  <text class="body" x="119" y="431">data split, train, test</text>
  <text class="body" x="119" y="451">metrics, curves, logs</text>

  <rect class="box red" x="382" y="380" width="206" height="92"/>
  <text class="head" x="407" y="407">Constrained LLM</text>
  <text class="body" x="407" y="431">local model patch</text>
  <text class="body" x="407" y="451">interface validation</text>

  <rect class="box green" x="674" y="380" width="214" height="92"/>
  <text class="head" x="699" y="407">Candidate Evaluation</text>
  <text class="body" x="699" y="431">same harness rerun</text>
  <text class="body" x="699" y="451">probe-aligned deltas</text>

  <rect class="box gold" x="974" y="380" width="190" height="92"/>
  <text class="head" x="999" y="407">Protected Selection</text>
  <text class="body" x="999" y="431">accept improvement</text>
  <text class="body" x="999" y="451">reject regression</text>

  <path class="edgeBlue" d="M298 426 L375 426"/>
  <path class="edgeBlue" d="M588 426 L667 426"/>
  <path class="edgeBlue" d="M888 426 L967 426"/>
  <path class="edgeDash" d="M1100 380 C1100 316 1084 292 1043 255"/>
  <path class="edgeDash" d="M780 380 C740 318 700 284 659 246"/>

  <rect class="band" x="66" y="545" width="1148" height="98"/>
  <text class="stage" x="92" y="573">AUDITABLE OUTPUT</text>

  <rect class="tag blue" x="112" y="593" width="202" height="32"/>
  <text class="body" x="137" y="614">feedback vector</text>
  <rect class="tag green" x="350" y="593" width="202" height="32"/>
  <text class="body" x="374" y="614">routing evidence</text>
  <rect class="tag red" x="588" y="593" width="202" height="32"/>
  <text class="body" x="617" y="614">patch diff</text>
  <rect class="tag gold" x="826" y="593" width="202" height="32"/>
  <text class="body" x="854" y="614">trust update</text>
  <rect class="tag green" x="1064" y="593" width="110" height="32"/>
  <text class="body" x="1085" y="614">report</text>

  <path class="edge" d="M197 472 L197 586"/>
  <path class="edge" d="M781 472 L781 586"/>
  <path class="edge" d="M1069 472 L1069 586"/>

  <text class="tiny" x="72" y="670">Main invariant: the LLM proposes edits, but the fixed harness and evidence graph decide routing, acceptance, memory, and the final model.</text>
</svg>
